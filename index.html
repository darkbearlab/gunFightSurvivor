<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羅賓漢戰記 - Phase 14</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- UI Layer -->
<div id="ui-layer" style="display:none;">
    <div class="hud-box">
        <div class="stat-row">
            <span>⏳ <span id="time-display" style="color: cyan;">05:00</span></span>
            <span>💰 <span id="gold-display" style="color: gold;">0</span></span>
        </div>
        <div>
            名聲: <span id="rep-display">0</span> / <span id="target-rep-display">3000</span>
            <div class="bar-container"><div id="rep-bar" class="bar-fill"></div></div>
        </div>
        <div style="margin-top:5px; font-size:12px; color:#aaa; display: flex; align-items: center;">
            <span style="margin-right: 10px;">部隊: <span id="squad-count">0</span> | 敵軍: <span id="enemy-count">0</span></span>
            <span id="buff-gold" class="buff-icon">🏆</span>
            <span id="buff-rep" class="buff-icon">📜</span>
        </div>
    </div>
</div>

<div id="mobile-controls" style="display:none;">
    <div id="mode-btn" onclick="toggleMode()">🛡️<br>跟隨</div>
</div>

<!-- Start Screen (Class Selection) -->
<div id="start-screen">
    <div id="gear-btn" onclick="openSettings()">⚙️</div>
    <h1>羅賓漢戰記</h1>
    <div class="skill-container">
        <div class="skill-card selected" onclick="selectClass(this, 'warrior')">
            <div class="skill-icon">⚔️</div>
            <div class="skill-name">戰士</div>
            <div class="skill-desc">高血量<br>近戰速攻</div>
        </div>
        <div class="skill-card" onclick="selectClass(this, 'archer')">
            <div class="skill-icon">🏹</div>
            <div class="skill-name">射手</div>
            <div class="skill-desc">低血量<br>長程狙擊</div>
        </div>
        <div class="skill-card" onclick="selectClass(this, 'mage')">
            <div class="skill-icon">🔮</div>
            <div class="skill-name">法師</div>
            <div class="skill-desc">極脆皮<br>範圍回血</div>
        </div>
    </div>
    <button id="start-btn" onclick="startGame()">開始起義</button>
</div>

<!-- Settings Modal -->
<div id="settings-modal">
    <h2 style="margin-top:0; border-bottom:1px solid #555; padding-bottom:10px;">遊戲平衡設定</h2>
    <div id="settings-content"></div>
    <div class="modal-btns">
        <button class="modal-btn cancel-btn" onclick="closeSettings()">取消</button>
        <button class="modal-btn save-btn" onclick="saveSettings()">保存並關閉</button>
    </div>
</div>

<!-- Game Over -->
<div id="game-over-screen">
    <div id="game-over-title">GAME OVER</div>
    <div id="game-over-desc" style="padding: 0 20px;"></div>
    <button class="restart-btn" onclick="location.reload()">再玩一次</button>
</div>

<div id="game-container"></div>

<script src="game.js"></script>

</body>
</html>
